uxaConfig:
  apiKey: "sk-"
  provider: "gemini"
  model: "gemma-4-31b-it"
  query: "Hey please visit my website https://tkr41850-debug.github.io/tka/ and explore and interact with it. Provide UX feedback."

replicaCount: 1

image:
  repository: lithoium/uxa-job
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 256Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  exec:
    command:
    - cat
    - /root/.zeroclaw/config.toml.tmp
  failureThreshold: 300
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /
    port: 8000

nodeSelector: {}

tolerations: []

affinity: {}
